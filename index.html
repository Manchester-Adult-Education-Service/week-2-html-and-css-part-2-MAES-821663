<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Registration Portal</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>

    <main>
        <h1>Create Your Account</h1>
        <form>
            <div class="form-group">
                <label for="fname">First Name</label>
                <input type="text" id="fname" required placeholder="Abraham">
            </div>
            <div class="form-group">
                <label for="lname">Surname</label>
                <input type="text" id="lname" required placeholder="Lincoln">
            </div>
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" required placeholder="firstnamelastname@gmail.com">
            </div>
            <div class="form-group">
                <label for="pass">Password</label>
                <input type="password" id="pass" minlength="8" required placeholder="Guest123">
            </div>

            <button>Create account</button>

        </form>
        </main>

</body>
</html>
